    sortOrder: 2
  - slug: organizations-coordination-work
    title: Organizations, Coordination, and Operational Work
    kind: core
    shortDescription: How do people, teams, technologies, responsibilities, and incentives combine to produce coordinated action?
    sortOrder: 3
  - slug: information-data-knowledge
    title: Information, Data, and Knowledge Systems
