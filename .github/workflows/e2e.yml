name: E2E

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @loura/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
