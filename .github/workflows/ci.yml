name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: 0.11.28
          enable-cache: true
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12.13"
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project services/ingest-worker --frozen
      - run: pnpm db:generate
      - run: git diff --exit-code -- supabase/migrations
      - run: pnpm verify

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec supabase start -x studio,imgproxy,logflare,vector,edge-runtime,realtime,mailpit,postgres-meta
      - run: pnpm test:db

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high --prod
