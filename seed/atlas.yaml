concepts:
  - slug: system-boundary
    canonicalName: System and Boundary
    domain: systems-control-decision
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: A chosen distinction between the system being reasoned about and its surrounding environment.
  - slug: desired-state
    canonicalName: Desired State
    domain: systems-engineering-deployment
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: An observable condition the system is intended to reach or maintain.
  - slug: state-transition
    canonicalName: State Transition
    domain: information-data-knowledge
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: A permitted change from one represented system state to another.
  - slug: observation
    canonicalName: Observation and Uncertainty
    domain: research-reasoning-measurement
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: A measurement-informed view of system conditions whose limits and uncertainty remain explicit.
  - slug: feedback-control
    canonicalName: Feedback Control
    domain: systems-control-decision
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: Regulation that compares observed outcomes with a desired state and adjusts action.
    aliases:
      - value: Closed-loop regulation
        type: synonym
  - slug: decision-policy-plan
    canonicalName: Decision, Policy, and Plan
    domain: ai-reasoning-agents
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: Distinct mechanisms for selecting an outcome, constraining choices, and organizing intended action.
  - slug: authority-commitment
    canonicalName: Authority, Responsibility, and Commitment
    domain: organizations-coordination-work
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: The allocation of decision rights, accountable obligations, and explicit promises to act.
  - slug: workflow-coordination
    canonicalName: Workflow, Dependency, and Coordination
    domain: organizations-coordination-work
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: The organization of dependent work, handoffs, blocked states, and changed conditions across actors.
  - slug: bounded-autonomy
    canonicalName: Agent, Tool Use, and Bounded Autonomy
    domain: ai-reasoning-agents
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: Delegated computational action constrained by permissions, authority, and explicit intervention boundaries.
  - slug: idempotency
    canonicalName: Partial Failure, Retry, and Idempotency
    domain: software-distributed-integration
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: Action semantics that remain safe when execution is uncertain and attempts may be repeated.
  - slug: provenance-traceability
    canonicalName: Evidence, Provenance, and Traceability
    domain: information-data-knowledge
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: The evidence and origin chain connecting assertions, actions, transformations, and outcomes.
  - slug: verification-validation
    canonicalName: Verification, Validation, and Closure
    domain: systems-engineering-deployment
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: Distinct checks that work occurred, the intended outcome was achieved, and closure is justified.
  - slug: human-control
    canonicalName: Escalation, Override, and Human Control
    domain: human-ai-safety-governance
    status: draft
    priority: now
    targetMastery: 3
    conciseDefinition: Mechanisms that preserve appropriate human authority through intervention, escalation, and override.
  - slug: operational-learning
    canonicalName: Learning, Adaptation, and Operational Memory
    domain: organizations-coordination-work
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: Disciplined updating of records, expectations, models, and policy after operational outcomes.
  - slug: industrial-integration
    canonicalName: Industrial Application and Integration
    domain: manufacturing-industrial-operations
    status: draft
    priority: now
    targetMastery: 2
    conciseDefinition: Applying an operational loop across industrial systems, authority boundaries, and evidence sources.

