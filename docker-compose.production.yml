services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GRAPH_VISIBLE_NODE_CAP: ${GRAPH_VISIBLE_NODE_CAP:-100}
      ASK_MAX_CONTEXT_TOKENS: ${ASK_MAX_CONTEXT_TOKENS:-16000}
      PRODUCT_ANALYTICS_ENABLED: ${PRODUCT_ANALYTICS_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      worker:
        condition: service_started

  worker:
    build:
      context: services/ingest-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      WORKER_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8091
      WORKER_PROCESS_JOBS: "true"
    ports:
      - "127.0.0.1:8091:8091"
